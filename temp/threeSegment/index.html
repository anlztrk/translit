	<h1>Değişkenli Excel formülü üretici</h1> 

<div align="center"> Sol tarafa dış formülü, sağ tarafa iç formülü yazınız. Sol tarafta iç formüle referans olarak # karakterini kullanınız.<br> 
  <form name=transcription> 
	<table width="90%" cellspacing="0" cellpadding="0" style="border-collapse: collapse;">
    <tr>
        <!-- Left textarea -->
        <td style="padding-left: 0; padding-right: 10px;">
            <textarea name="text1"
                      style="width: 100%; box-sizing: border-box; resize: none;"
                      style="resize: none;" onKeyUp="cyrlat()"></textarea>

                      style="width: 100%; box-sizing: border-box; resize: none;"
                      style="resize: none;" onKeyUp="latcyr()"></textarea>
        </td>
    </tr>

    <!-- Bottom textarea spanning both -->
    <tr>
        <td colspan="2" style="padding-top: 10px; padding-left: 0; padding-right: 0;">
            <textarea name="text2"
                      style="width: 100%; box-sizing: border-box; resize: none;"></textarea>
        </td>
    </tr>
</table>
<script>
          document.addEventListener("DOMContentLoaded", () => {
            const textareas = Array.from(document.querySelectorAll("textarea"));

            function syncScroll(e) {
              const source = e.target;
              const sourceMax = source.scrollHeight - source.clientHeight;
              const percent = sourceMax > 0 ? source.scrollTop / sourceMax : 0;
              // Temporarily disable listeners
              textareas.forEach(t => {
                t.removeEventListener("scroll", syncScroll);
              });
              // Sync others
              textareas.forEach(t => {
                if (t === source) return;
                const targetMax = t.scrollHeight - t.clientHeight;
                t.scrollTop = targetMax > 0 ? percent * targetMax : 0;
              });
              // Re-enable listeners after browser finishes this frame
              requestAnimationFrame(() => {
                textareas.forEach(t => {
                  t.addEventListener("scroll", syncScroll, {
                    passive: true
                  });
                });
              });
            }
            textareas.forEach(t => {
              t.addEventListener("scroll", syncScroll, {
                passive: true
              });
            });
          });
        </script>
</form>
