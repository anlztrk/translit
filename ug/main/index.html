<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic&family=Gentium+Book+Plus&family=Tinos&display=swap" rel="stylesheet">
    <title>Uyghur Arabic - Latin - Cyrillic - CTA converter</title>
    <script type="text/javascript" src="conversion.js"></script>
    <style type="text/css">
      @font-face {
        font-family: 'GB-Plus';
        src: url('/translit/fonts/GentiumBookPlus-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        unicode-range: U+000-10FFFF;
      }

      textarea {
        font-family: 'GB-Plus', 'Liberation Serif', Tinos, Cambria, 'Times New Roman', serif;
        font-size: 15px;
        width: 500px;
        height: 300px;
      }

      .Arabic {
        font-family: 'Noto Naskh Arabic', Spectral, Cambria, 'Times New Roman', serif;
      }

      @media (max-width: 720px) {
        table {
          width: 100% !important;
          border-collapse: collapse;
        }

        tr {
          display: block;
          width: 100%;
        }

        td {
          display: block;
          width: 100% !important;
          padding-left: 0 !important;
          padding-right: 0 !important;
        }

        td[colspan] {
          width: 100% !important;
        }

        textarea {
          width: 100% !important;
          height: 300px;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <h1>Uyghur Arabic - Latin - Cyrillic - CTA converter</h1>
    <div align="center"> Type or copy a text:<br>
      <form name=transcription>
        <table width="90%" cellspacing="0" cellpadding="0" style="border-collapse: collapse;">
          <tr>
            <!-- Top left textarea -->
            <td width="50%">
              <center>in Uyghur Arabic alphabet: </center>
              <br>
              <textarea class="Arabic" dir="rtl" name="text1" style="width: 100%; box-sizing: border-box; resize: none;" onKeyUp="arblat();latcta();ctacyr()"></textarea>
              <br>
              <br>
              <center>
                <input type=button onClick="transcription.text1.select();copy1()" value="copy" class=bf> &nbsp; &nbsp; <input type=button onClick="reset();transcription.text1.focus()" value="clear" class=bf>
                <br>
                <br>
              </center>
              <!-- Top right textarea -->
            <td width="50%">
              <center>here you get it in the Uyghur Latin alphabet:</center>
              <br>
              <textarea name="text2" style="width: 100%; box-sizing: border-box; resize: none;" onKeyUp="latarb();latcta();ctacyr()"></textarea>
              <br>
              <br>
              <center>
                <input type=button onClick="transcription.text2.select();copy2()" value="copy" class=bf> &nbsp; &nbsp; <input type=button onClick="reset();transcription.text2.focus()" value="clear" class=bf>
                <br>
                <br>
              </center>
          </tr>
          <tr>
            <!-- Bottom left textarea -->
            <td width="50%">
              <center>here in the Uyghur Cyrillic alphabet:</center>
              <br>
              <textarea name="text4" style="width: 100%; box-sizing: border-box; resize: none;" onKeyUp="cyrcta();ctalat();latarb()"></textarea>
              <br>
              <br>
              <center>
                <input type=button onClick="transcription.text4.select();copy4()" value="copy" class=bf> &nbsp; &nbsp; <input type=button onClick="reset();transcription.text4.focus()" value="clear" class=bf>
                <br>
                <br>
              </center>
              <!-- Bottom right textarea -->
            <td width="50%">
              <center>and here in the Common Turkic alphabet:</center>
              <br>
              <textarea name="text3" style="width: 100%; box-sizing: border-box; resize: none;" onKeyUp="ctalat();latarb();ctacyr()"></textarea>
              <br>
              <br>
              <center>
                <input type=button onClick="transcription.text3.select();copy3()" value="copy" class=bf> &nbsp; &nbsp; <input type=button onClick="reset();transcription.text3.focus()" value="clear" class=bf>
                <br>
                <br>
              </center>
          </tr>
        </table>
        <script>
          document.addEventListener("DOMContentLoaded", () => {
            const textareas = Array.from(document.querySelectorAll("textarea"));

            function syncScroll(e) {
              const source = e.target;
              const sourceMax = source.scrollHeight - source.clientHeight;
              const percent = sourceMax > 0 ? source.scrollTop / sourceMax : 0;
              // Temporarily disable listeners
              textareas.forEach(t => {
                t.removeEventListener("scroll", syncScroll);
              });
              // Sync others
              textareas.forEach(t => {
                if (t === source) return;
                const targetMax = t.scrollHeight - t.clientHeight;
                t.scrollTop = targetMax > 0 ? percent * targetMax : 0;
              });
              // Re-enable listeners after browser finishes this frame
              requestAnimationFrame(() => {
                textareas.forEach(t => {
                  t.addEventListener("scroll", syncScroll, {
                    passive: true
                  });
                });
              });
            }
            textareas.forEach(t => {
              t.addEventListener("scroll", syncScroll, {
                passive: true
              });
            });
          });
        </script>
      </form>
  </body>
</html>
