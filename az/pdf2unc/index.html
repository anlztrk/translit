<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Tinos&family=Gentium+Book+Plus&display=swap');

      @font-face {
        font-family: A1-Lat;
        src: url("a1ln.woff2") format("woff2"), url("a1ln.woff") format("woff");
        font-display: block;
      }
    </style>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- d -->
    <meta NAME="ROBOTS" CONTENT="NOARCHIVE">
    <title>Azeri converter</title>
    <meta name="description" content="Azeri converter" />
    <meta http-equiv="Content-Language" content="en, ru">
    <meta name="revisit-after" content="2 Days">
    <base target="_top">
    <!-- d -->
    <script type="text/javascript" src="conversion.js"></script>
    <style type="text/css">
      @font-face {
        font-family: 'GB-Plus';
        src: url('/translit/fonts/GentiumBookPlus-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        unicode-range: U+000-10FFFF;
      }

      textarea {
        font-family: FreeSerif, 'Times New Roman', Times, 'Liberation Serif', Tinos, serif;
        font-size: 15px;
        width: 500px;
        height: 300px;
      }

      .PDF {
        font-family: 'A1-Lat', FreeSerif, 'Times New Roman', Times, 'Liberation Serif', Tinos, serif;
      }

      @media (max-width: 720px) {
        table {
          width: 100% !important;
          border-collapse: collapse;
        }

        tr {
          display: block;
          width: 100%;
        }

        td {
          display: block;
          width: 100% !important;
          padding-left: 0 !important;
          padding-right: 0 !important;
        }

        td[colspan] {
          width: 100% !important;
        }

        textarea {
          width: 100% !important;
          height: 300px;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <h1>Azeri converter</h1>
    <div align="center"> Type or copy a text <br>
      <form name=transcription>
        <table width=90%>
          <tr align=center>
            <td> PDF <br>
              <textarea class="PDF" name="text1" style="resize: none;" onKeyUp="cyrlat()"></textarea>
              <br>
              <br>
              <input type=button onClick="transcription.text1.select();copy1()" value="copy" class=bf> &nbsp; &nbsp; <input type=button onClick="reset();transcription.text1.focus()" value="clear" class=bf>
              <br>
              <br>
            </td>
            <td> Azeri Latin <br>
              <textarea name="text2" style="resize: none;" onKeyUp="latcyr()"></textarea>
              <br>
              <br>
              <input type=button onClick="transcription.text2.select();copy2()" value="copy" class=bf> &nbsp; &nbsp; <input type=button onClick="reset();transcription.text2.focus()" value="clear" class=bf>
              <br>
              <br>
            </td>
          </tr>
        </table>
        <script>
          document.addEventListener("DOMContentLoaded", () => {
            const textareas = Array.from(document.querySelectorAll("textarea"));

            function syncScroll(e) {
              const source = e.target;
              const sourceMax = source.scrollHeight - source.clientHeight;
              const percent = sourceMax > 0 ? source.scrollTop / sourceMax : 0;
              // Temporarily disable listeners
              textareas.forEach(t => {
                t.removeEventListener("scroll", syncScroll);
              });
              // Sync others
              textareas.forEach(t => {
                if (t === source) return;
                const targetMax = t.scrollHeight - t.clientHeight;
                t.scrollTop = targetMax > 0 ? percent * targetMax : 0;
              });
              // Re-enable listeners after browser finishes this frame
              requestAnimationFrame(() => {
                textareas.forEach(t => {
                  t.addEventListener("scroll", syncScroll, {
                    passive: true
                  });
                });
              });
            }
            textareas.forEach(t => {
              t.addEventListener("scroll", syncScroll, {
                passive: true
              });
            });
          });
        </script>
      </form>
  </body>
</html>
